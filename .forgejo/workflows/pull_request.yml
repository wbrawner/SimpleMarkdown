name: Build & Test

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate
    steps:
      - uses: https://git.wbrawner.com/actions/checkout@v6
      - name: set up JDK
        uses: https://git.wbrawner.com/actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Validate Gradle Wrapper
        uses: https://git.wbrawner.com/gradle/actions/wrapper-validation@342e94ec9aa7226938939f1ad2c761d1245996f5
  unit_tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - uses: https://git.wbrawner.com/actions/checkout@v6
      - name: set up JDK
        uses: https://git.wbrawner.com/actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: https://git.wbrawner.com/android-actions/setup-android@v3
      - name: Setup Gradle
        uses: https://git.wbrawner.com/gradle/actions/setup-gradle@342e94ec9aa7226938939f1ad2c761d1245996f5
      - name: Run unit tests
        run: ./gradlew check
      - name: Publish JUnit Results
        uses: https://git.wbrawner.com/actions/upload-artifact@v3
        if: always()
        with:
          name: Unit Test Results
          path: "*/build/reports/*"
          if-no-files-found: error
  ui_tests:
    if: false
    runs-on: ubuntu-latest
    name: Run UI Tests
    needs:
      - unit_tests
    steps:
      - uses: https://git.wbrawner.com/actions/checkout@v6
      - name: set up JDK
        uses: https://git.wbrawner.com/actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: https://git.wbrawner.com/android-actions/setup-android@v3
      - name: Setup Gradle
        uses: https://git.wbrawner.com/gradle/actions/setup-gradle@342e94ec9aa7226938939f1ad2c761d1245996f5
      - name: Build APKs
        run: ./gradlew assemblePlayDebug assemblePlayDebugAndroidTest
      - name: Grant execute permission for flank_auth.sh
        run: chmod +x flank_auth.sh
      - name: Add auth for flank
        env:
          GCLOUD_KEY: ${{ secrets.GCLOUD_KEY }}
        run: |
          ./flank_auth.sh
      - name: Run UI tests
        run: ./gradlew runFlank
